# coturn — STUN + TURN for Vox calls (one daemon does both).
#
# Uses time-limited credentials (the REST / use-auth-secret scheme): the Vox
# relay hands each client a short-lived username/password derived from the shared
# secret, so the secret itself never ships to clients and leaked creds expire.
# The relay's TURN_SECRET must equal coturn's static-auth-secret (passed on the
# command line from the same .env — see the compose file).

listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
realm=vox

# Media relay port range — OPEN THESE UDP PORTS on your firewall/security group.
min-port=49160
max-port=49200

# Tell coturn its public address (required on a cloud box behind a 1:1 NAT):
# external-ip=YOUR.PUBLIC.IP

# Hardening: refuse to relay to private/loopback ranges so the TURN server can't
# be abused to reach internal services. (TCP relay stays ON so the transport=tcp
# fallback works for clients on UDP-blocked networks.)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
