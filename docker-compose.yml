services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vox_dev
    ports:
      - "5432:5432"
    volumes:
      - chat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  chat_pg_data:
